services:
  - type: web
    name: material-analyzer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: AI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: AI_MODEL
        value: deepseek-chat
      - key: AI_TIMEOUT
        value: "30"
      - key: AI_API_KEY
        sync: false
